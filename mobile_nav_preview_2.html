<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Bar 2: Fluid Curved</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .phone-mockup {
            width: 375px;
            height: 812px;
            background: #f4f6f9;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1), inset 0 0 0 10px #000;
            overflow: hidden;
            border: 4px solid #333;
        }
        .header {
            padding: 50px 20px 20px;
            background: #fff;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
        }
        .header h1 { font-size: 24px; color: #333; }
        .nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            padding-bottom: 10px;
        }
        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 70px;
            height: 100%;
            text-decoration: none;
            color: #b0b3b8;
            transition: 0.3s;
            z-index: 2;
        }
        .nav-item i {
            font-size: 22px;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .nav-item .text {
            font-size: 11px;
            font-weight: 600;
            margin-top: 5px;
            transition: 0.3s;
            opacity: 1;
            position: absolute;
            bottom: 8px;
        }
        .nav-item.active {
            color: #fff;
        }
        .nav-item.active i {
            transform: translateY(-30px);
            color: #fff;
        }
        .nav-item.active .text {
            opacity: 1;
            color: #007bff;
        }
        .indicator {
            position: absolute;
            top: -25px;
            width: 54px;
            height: 54px;
            background: #007bff;
            border-radius: 50%;
            border: 6px solid #f4f6f9;
            transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            box-shadow: 0 10px 15px rgba(0,123,255,0.3);
        }
        /* Gooey pseudo elements */
        .indicator::before, .indicator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 20px;
            background: transparent;
        }
        .indicator::before {
            left: -24px;
            border-top-right-radius: 20px;
            box-shadow: 4px -5px 0 0 #f4f6f9;
        }
        .indicator::after {
            right: -24px;
            border-top-left-radius: 20px;
            box-shadow: -4px -5px 0 0 #f4f6f9;
        }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <div class="header">
            <h1>Clinics & Care</h1>
        </div>
        <nav class="nav">
            <div class="indicator"></div>
            <a href="#" class="nav-item active" onclick="setActive(this, 0)">
                <i class="fa-solid fa-house"></i>
                <span class="text">Home</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this, 1)">
                <i class="fa-regular fa-calendar-check"></i>
                <span class="text">Book</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this, 2)">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span class="text">Search</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this, 3)">
                <i class="fa-regular fa-user"></i>
                <span class="text">Profile</span>
            </a>
        </nav>
    </div>
    <script>
        function setActive(element, index) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            const indicator = document.querySelector('.indicator');
            const containerWidth = document.querySelector('.nav').offsetWidth;
            const itemWidth = containerWidth / 4;
            // Center the indicator over the clicked item
            const leftOffset = (itemWidth * index) + (itemWidth / 2) - 27; // 27 is half of indicator width
            indicator.style.left = `${leftOffset}px`;
        }
        
        window.onload = () => {
             const activeItem = document.querySelector('.nav-item.active');
             const indicator = document.querySelector('.indicator');
             const containerWidth = document.querySelector('.nav').offsetWidth;
             const itemWidth = containerWidth / 4;
             indicator.style.left = `${(itemWidth / 2) - 27}px`;
        }
    </script>
</body>
</html>
