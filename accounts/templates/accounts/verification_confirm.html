{% extends 'accounts/base.html' %}
{% load mask_filters %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <h2 class="card-title mb-4">تأكيد التحقق من البريد الإلكتروني</h2>
                    <p class="mb-4">أنت على وشك التحقق من عنوان البريد الإلكتروني التالي:</p>
                    <h4 class="text-primary mb-4">{{ email|mask_email }}</h4>

                    <p class="text-muted mb-4">
                        يرجى تأكيد أن هذا بريدك الإلكتروني لإتمام عملية التحقق.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg">
                                تأكيد والتحقق
                            </button>
                            <a href="{% url 'patients:profile' %}" class="btn btn-outline-secondary">
                                إلغاء
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
