<div class="glass-card overflow-hidden transition-all duration-150 hover:shadow-md
            {% if not notif.is_read %}ring-1 ring-primary-200 dark:ring-primary-800/60{% endif %}">

    <!-- Unread top bar -->
    {% if not notif.is_read %}
    <div class="h-0.5 bg-gradient-to-r from-primary-500 to-primary-400 dark:from-primary-400 dark:to-primary-600"></div>
    {% endif %}

    <div class="flex items-start gap-4 p-4 sm:p-5">

        <!-- Icon -->
        <div class="flex-shrink-0 w-11 h-11 rounded-xl {{ color_bg }} {{ color_text }} flex items-center justify-center text-base mt-0.5">
            <i class="{{ icon_class }}"></i>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">

            <!-- Title row -->
            <div class="flex items-start justify-between gap-3 mb-1.5">
                <div class="flex items-center gap-2 min-w-0">
                    {% if not notif.is_read %}
                    <span class="w-2 h-2 rounded-full bg-primary-500 dark:bg-primary-400 flex-shrink-0"></span>
                    {% endif %}
                    <p class="text-sm font-bold text-gray-900 dark:text-white leading-snug">{{ notif.title }}</p>
                </div>
                <span class="text-xs text-gray-400 dark:text-slate-500 flex-shrink-0 whitespace-nowrap pt-0.5">
                    <i class="fa-regular fa-clock mr-1 opacity-70"></i>{{ notif.created_at|timesince }} ago
                </span>
            </div>

            <!-- Type badge -->
            <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide {{ badge_bg }} {{ badge_text }} mb-2">
                {{ label }}
            </span>

            <!-- Message -->
            <p class="text-sm text-gray-600 dark:text-slate-300 leading-relaxed mb-3.5">{{ notif.message }}</p>

            <!-- Actions -->
            <div class="flex items-center gap-4 flex-wrap">

                {% if notif.target_url %}
                <a href="{{ notif.target_url }}"
                   class="inline-flex items-center gap-1.5 text-xs font-semibold
                          text-primary-600 dark:text-primary-400 hover:text-primary-700 dark:hover:text-primary-300
                          transition-colors">
                    <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    View Appointments
                </a>
                <span class="w-px h-3.5 bg-gray-200 dark:bg-slate-600"></span>
                {% endif %}

                {% if not notif.is_read %}
                <form method="post" action="{% url 'appointments:mark_notification_read' notif.pk %}" class="m-0">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ request.path }}">
                    <button type="submit"
                            class="inline-flex items-center gap-1.5 text-xs font-semibold
                                   text-gray-500 dark:text-slate-400
                                   hover:text-gray-800 dark:hover:text-gray-200 transition-colors">
                        <i class="fa-regular fa-circle-check text-[11px]"></i>
                        Mark as Read
                    </button>
                </form>
                {% else %}
                <span class="inline-flex items-center gap-1.5 text-xs text-gray-400 dark:text-slate-500">
                    <i class="fa-solid fa-check text-[10px] text-emerald-500"></i>
                    Read
                </span>
                {% endif %}

            </div>
        </div>
    </div>
</div>
