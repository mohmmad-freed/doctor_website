{% extends "accounts/base.html" %}

{% block title %}دعوة غير صالحة{% endblock %}

{% block content %}
<div class="container" style="margin-top: 2rem;">
<div class="row min-vh-50 align-items-center justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning"></i>
                </div>
                <h3 class="mb-3 text-danger">عذراً، فشل في معالجة الدعوة</h3>
                <p class="lead text-muted mb-4">{{ error }}</p>
                <a href="{% url 'accounts:home' %}" class="btn btn-primary px-4 py-2">
                    <i class="fas fa-home me-2"></i> العودة للصفحة الرئيسية
                </a>
            </div>
        </div>
    </div>
</div>
</div>
{% endblock %}
