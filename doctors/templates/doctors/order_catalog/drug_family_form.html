{% extends "doctors/base_doctor.html" %}
{% block title %}{{ form_title }} | Doctor Portal{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

  <div class="mb-6">
    <a href="{% url 'doctors:order_catalog' %}?tab=drugs&clinic_id={{ clinic.id }}"
       class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 transition-colors mb-3">
      <i class="fa-solid fa-arrow-left text-xs"></i> Back to Order Catalog
    </a>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">{{ form_title }}</h1>
    <p class="text-sm text-gray-500 dark:text-slate-400 mt-1">{{ clinic.name }}</p>
  </div>

  {% for msg in messages %}
  <div class="mb-4 px-4 py-3 rounded-xl text-sm font-medium
    {% if msg.tags == 'error' %}bg-red-50 dark:bg-red-900/20 text-red-700 dark:text-red-300 border border-red-200 dark:border-red-700/40
    {% else %}bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 border border-blue-200 dark:border-blue-700/40{% endif %}">
    {{ msg }}
  </div>
  {% endfor %}

  <div class="glass-card p-6">
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="clinic_id" value="{{ clinic.id }}">

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">
            Family Name <span class="text-red-500">*</span>
          </label>
          <input type="text" name="name" value="{{ family.name|default:'' }}" required
                 placeholder="e.g. Antibiotics, Beta-Blockers, NSAIDs"
                 class="ws-input w-full"
                 autofocus>
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 dark:text-slate-300 mb-1.5">
            Description <span class="text-xs font-normal text-gray-400">(optional)</span>
          </label>
          <textarea name="description" rows="2"
                    placeholder="Brief description of this drug family"
                    class="ws-input w-full resize-none">{{ family.description|default:'' }}</textarea>
        </div>
      </div>

      <div class="flex items-center gap-3 mt-6">
        <button type="submit"
                class="inline-flex items-center gap-2 bg-primary-600 hover:bg-primary-700 active:scale-95 text-white font-semibold text-sm px-5 py-2.5 rounded-xl transition-all shadow-sm">
          <i class="fa-solid fa-floppy-disk"></i> {{ submit_label }}
        </button>
        <a href="{% url 'doctors:order_catalog' %}?tab=drugs&clinic_id={{ clinic.id }}"
           class="inline-flex items-center gap-2 text-sm font-medium text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 px-4 py-2.5 rounded-xl border border-gray-200 dark:border-slate-600 hover:bg-gray-50 dark:hover:bg-slate-700 transition-colors">
          Cancel
        </a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
