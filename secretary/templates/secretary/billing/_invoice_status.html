{% load i18n %}<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold {% if invoice.status == 'PAID' %}bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300{% elif invoice.status == 'PARTIAL' %}bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300{% elif invoice.status == 'DRAFT' %}bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-300{% elif invoice.status == 'ISSUED' %}bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300{% elif invoice.status == 'CANCELLED' %}bg-gray-200 text-gray-600 dark:bg-slate-700 dark:text-slate-300{% elif invoice.status == 'REFUNDED' %}bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300{% else %}bg-gray-100 text-gray-600{% endif %}">{{ invoice.get_status_display }}</span>
