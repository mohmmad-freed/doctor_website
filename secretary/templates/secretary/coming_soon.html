{% extends "secretary/base_secretary.html" %}
{% block title %}{{ title }} — قيد التطوير{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-sm overflow-hidden">
    <div class="absolute inset-x-0 top-0 h-1 bg-gradient-to-l from-primary-500 to-accent-500"></div>
    <div class="flex flex-col items-center text-center py-16 px-8 gap-4">
      <div class="w-16 h-16 rounded-2xl bg-primary-50 dark:bg-primary-900/20 flex items-center justify-center">
        <i class="fa-solid fa-hammer text-primary-400 dark:text-primary-500 text-2xl"></i>
      </div>
      <div>
        <h1 class="text-xl font-bold text-gray-900 dark:text-white">{{ title }}</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-2 leading-relaxed max-w-md">
          هذه الصفحة قيد التطوير حالياً وستكون متاحة قريباً.
          <br>يمكنك العودة إلى لوحة التحكم في الوقت الحالي.
        </p>
      </div>
      <a href="{% url 'secretary:dashboard' %}"
         class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold transition-colors">
        <i class="fa-solid fa-gauge-high text-xs"></i>
        العودة للوحة التحكم
      </a>
    </div>
  </div>
</div>
{% endblock %}
