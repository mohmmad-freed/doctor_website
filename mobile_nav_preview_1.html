<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Bar 1: Glass Island</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        .phone-mockup {
            width: 375px;
            height: 812px;
            background: url("https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=375&auto=format&fit=crop") center/cover;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15), inset 0 0 0 10px #000;
            overflow: hidden;
            border: 4px solid #333;
        }
        .nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 65px;
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .nav-item {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: #fff;
            width: 50px;
            height: 45px;
            border-radius: 25px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
        }
        .nav-item i {
            font-size: 20px;
            transition: all 0.3s;
        }
        .nav-item.active {
            color: #fff;
            width: 110px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 15px rgba(118, 75, 162, 0.4);
        }
        .nav-item.active i {
            margin-right: 8px;
        }
        .nav-item .text {
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            width: 0;
            overflow: hidden;
            transition: all 0.4s;
            white-space: nowrap;
        }
        .nav-item.active .text {
            opacity: 1;
            width: max-content;
        }
        /* Top bar for mockup */
        .status-bar {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="phone-mockup">
        <div class="status-bar">
            <span>9:41</span>
            <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
        </div>
        <nav class="nav">
            <a href="#" class="nav-item active" onclick="setActive(this)">
                <i class="fa-solid fa-house"></i>
                <span class="text">Home</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this)">
                <i class="fa-regular fa-calendar-check"></i>
                <span class="text">Book</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this)">
                <i class="fa-solid fa-user-doctor"></i>
                <span class="text">Search</span>
            </a>
            <a href="#" class="nav-item" onclick="setActive(this)">
                <i class="fa-regular fa-user"></i>
                <span class="text">Profile</span>
            </a>
        </nav>
    </div>
    <script>
        function setActive(element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
